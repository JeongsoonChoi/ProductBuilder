
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" title="테마 변경">
            <i class="fas fa-moon"></i>
        </button>
        <header>
            <h1><i class="fas fa-paw"></i> 인공지능 동물상 테스트</h1>
            <p>나는 강아지상일까, 고양이상일까? AI가 분석해드립니다!</p>
        </header>
        <main>
            <div id="upload-area" class="upload-area">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <p>사진을 올리거나 눌러서 업로드하세요</p>
                <input type="file" id="image-upload" accept="image/*" hidden>
            </div>
            
            <div id="image-preview-container" class="image-preview-container" style="display: none;">
                <img id="face-image" src="" alt="your image">
                <div id="loading" class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>AI가 분석 중입니다...</p>
                </div>
            </div>

            <div id="result-container" class="result-container" style="display: none;">
                <h2 id="result-message"></h2>
                <div id="label-container"></div>
                <button id="retry-btn" class="retry-btn"><i class="fas fa-redo"></i> 다시 하기</button>
            </div>

            <section class="contact-section">
                <hr>
                <h3><i class="fas fa-envelope"></i> 제휴 문의</h3>
                <form action="https://formspree.io/f/meelnebn" method="POST" class="contact-form">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="성함/업체명" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="_replyto" placeholder="이메일 주소" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">보내기</button>
                </form>
            </section>

            <section class="comment-section">
                <hr>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                    /*
                    var disqus_config = function () {
                    this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                    };
                    */
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://jschoi.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>
        <footer>
            <p>&copy; 2024 행운의 번호. All rights reserved.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
