
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" title="테마 변경">
            <i class="fas fa-moon"></i>
        </button>
        <header>
            <h1><i class="fas fa-dice"></i> 로또 번호 추천</h1>
            <p>버튼을 클릭하여 행운의 번호를 받아보세요!</p>
        </header>
        <main>
            <div class="lotto-numbers">
                <!-- 자바스크립트로 번호가 채워집니다. -->
            </div>
            <button id="generate-btn"><i class="fas fa-sync-alt"></i> 번호 생성</button>

            <section class="contact-section">
                <hr>
                <h3><i class="fas fa-envelope"></i> 제휴 문의</h3>
                <form action="https://formspree.io/f/meelnebn" method="POST" class="contact-form">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="성함/업체명" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="_replyto" placeholder="이메일 주소" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">보내기</button>
                </form>
            </section>

            <section class="comment-section">
                <hr>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                    /*
                    var disqus_config = function () {
                    this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                    };
                    */
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://jschoi.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>
        <footer>
            <p>&copy; 2024 행운의 번호. All rights reserved.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
